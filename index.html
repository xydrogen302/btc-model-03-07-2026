const SHARED_BTC_SNAPSHOT_TTL_MS = 90000;
let sharedBitcoinSnapshot = null;
let sharedBitcoinSnapshotPromise = null;

function sharedUtcDayStart(timestamp) {
  const date = new Date(Number(timestamp));
  return Date.UTC(date.getUTCFullYear(), date.getUTCMonth(), date.getUTCDate());
}
function normalizeSharedDailyPoints(points) {
  const byDay = new Map();
  (Array.isArray(points) ? points : []).forEach((point) => {
    const timestamp = Array.isArray(point) ? Number(point[0]) : Number(point && point.timestamp);
    const price = Array.isArray(point) ? Number(point[1]) : Number(point && point.price);
    if (!Number.isFinite(timestamp) || !Number.isFinite(price) || price <= 0) return;
    const day = sharedUtcDayStart(timestamp);
    const existing = byDay.get(day);
    if (!existing || timestamp >= existing.sourceTimestamp) byDay.set(day, { timestamp: day, sourceTimestamp: timestamp, price });
  });
  return Array.from(byDay.values()).sort((a, b) => a.timestamp - b.timestamp).map((point) => ({ timestamp: point.timestamp, price: point.price }));
}
function copySharedSnapshot(snapshot) {
  return {
    price: snapshot.price,
    priceSource: snapshot.priceSource,
    lastUpdated: snapshot.lastUpdated,
    indicatorPoints: snapshot.indicatorPoints.map((point) => ({ timestamp: point.timestamp, price: point.price }))
  };
}
window.getSharedBitcoinIndicatorSnapshot = async function() {
  const now = Date.now();
  if (sharedBitcoinSnapshot && now - sharedBitcoinSnapshot.fetchedAt < SHARED_BTC_SNAPSHOT_TTL_MS) return copySharedSnapshot(sharedBitcoinSnapshot);
  if (sharedBitcoinSnapshotPromise) return sharedBitcoinSnapshotPromise.then(copySharedSnapshot);

  sharedBitcoinSnapshotPromise = (async () => {
    let indicatorPoints = normalizeSharedDailyPoints(SHARED_BTC_DAILY_FALLBACK);
    let price = indicatorPoints[indicatorPoints.length - 1].price;
    let lastUpdated = indicatorPoints[indicatorPoints.length - 1].timestamp;
    let priceSource = "UPLOADED BTC CSV FALLBACK";
    const key = "CG-CMkwS2X4CKH6WzUFoU6xFx21";

    try {
      const historyUrl = new URL("https://api.coingecko.com/api/v3/coins/bitcoin/market_chart");
      historyUrl.searchParams.set("vs_currency", "usd");
      historyUrl.searchParams.set("days", "800");
      historyUrl.searchParams.set("x_cg_demo_api_key", key);
      historyUrl.searchParams.set("_", String(Date.now()));
      const historyResponse = await fetch(historyUrl.toString(), { cache: "no-store", headers: { accept: "application/json" } });
      if (historyResponse.ok) {
        const historyData = await historyResponse.json();
        const fetchedPoints = normalizeSharedDailyPoints(historyData && historyData.prices ? historyData.prices : []);
        if (fetchedPoints.length >= 30) indicatorPoints = fetchedPoints;
      }
    } catch (_) {}

    try {
      const priceUrl = new URL("https://api.coingecko.com/api/v3/simple/price");
      priceUrl.searchParams.set("ids", "bitcoin");
      priceUrl.searchParams.set("vs_currencies", "usd");
      priceUrl.searchParams.set("include_last_updated_at", "true");
      priceUrl.searchParams.set("x_cg_demo_api_key", key);
      priceUrl.searchParams.set("_", String(Date.now()));
      const priceResponse = await fetch(priceUrl.toString(), { cache: "no-store", headers: { accept: "application/json" } });
      if (priceResponse.ok) {
        const priceData = await priceResponse.json();
        const live = priceData && priceData.bitcoin;
        const livePrice = Number(live && live.usd);
        if (Number.isFinite(livePrice) && livePrice > 0) {
          price = livePrice;
          lastUpdated = Number(live.last_updated_at) > 0 ? Number(live.last_updated_at) * 1000 : Date.now();
          priceSource = "LIVE";
        }
      }
    } catch (_) {}

    sharedBitcoinSnapshot = { price, priceSource, lastUpdated, indicatorPoints, fetchedAt: Date.now() };
    return sharedBitcoinSnapshot;
  })().finally(() => { sharedBitcoinSnapshotPromise = null; });

  return sharedBitcoinSnapshotPromise.then(copySharedSnapshot);
};

const frames = {
  "page-1m": document.getElementById("page-1m"),
  "page-12m": document.getElementById("page-12m")
};

frames["page-1m"].srcdoc = PAGE_1M_HTML;
frames["page-12m"].srcdoc = PAGE_1Y_HTML;

function activeFrame() {
  return document.querySelector(".page-frame.active");
}

function resizeFrame(frame) {
  if (!frame || !frame.contentWindow || !frame.contentWindow.document) return;
  const doc = frame.contentWindow.document;
  const app = doc.querySelector(".app");
  const contentHeight = app
    ? Math.ceil(app.getBoundingClientRect().bottom)
    : Math.ceil(Math.max(
        doc.body ? doc.body.scrollHeight : 0,
        doc.documentElement ? doc.documentElement.scrollHeight : 0
      ));
  frame.style.height = `${Math.max(contentHeight, 1)}px`;
}

function resizeActiveFrame() {
  resizeFrame(activeFrame());
}

Object.values(frames).forEach((frame) => {
  frame.addEventListener("load", () => {
    resizeFrame(frame);
    try {
      const doc = frame.contentWindow.document;
      const observer = new MutationObserver(() => resizeFrame(frame));
      observer.observe(doc.documentElement, { childList: true, subtree: true, attributes: true, characterData: true });
    } catch (error) {}
  });
});

function selectPage(target) {
  if (!frames[target]) return;
  document.querySelectorAll(".page-frame").forEach((frame) => frame.classList.toggle("active", frame.id === target));
  history.replaceState(null, "", `#${target.replace("page-", "")}`);
  setTimeout(resizeActiveFrame, 50);
}

function openHashPage() {
  const hash = window.location.hash.replace("#", "").toLowerCase();
  if (hash === "12m") selectPage("page-12m");
  if (hash === "1m") selectPage("page-1m");
}

window.addEventListener("resize", resizeActiveFrame);
window.addEventListener("hashchange", openHashPage);
window.setInterval(resizeActiveFrame, 1000);
openHashPage();
